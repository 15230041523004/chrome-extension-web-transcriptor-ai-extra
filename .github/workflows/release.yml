name: Build & Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Create ZIP
        run: |
          if [ -d "dist" ]; then
            cd dist
            zip -r ../chrome-extension.zip ./*
            echo "✅ ZIP created successfully"
          else
            echo "❌ dist folder not found after build!"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          name: Release $(date +%Y-%m-%d)
          files: chrome-extension.zip
          generate_release_notes: true
