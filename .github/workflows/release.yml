name: Build & Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Create ZIP
        run: |
          if [ -d "dist" ]; then
            cd dist
            zip -r ../chrome-extension-web-transcriptor-ai-extra.zip ./
            echo "✅ ZIP created: chrome-extension-web-transcriptor-ai-extra.zip"
          else
            echo "❌ dist folder not found after build!"
            exit 1
          fi

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: chrome-extension-web-transcriptor-ai-extra.zip
          generate_release_notes: true
          draft: false
          prerelease: false
